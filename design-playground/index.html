<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>makesense.ink · 全站設計 Playground</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #f0eee9; font-family: var(--font-sans), "Noto Sans TC", system-ui, sans-serif; }

/* ============ DESIGN TOKENS — controlled by Tweak panel ============ */
:root {
  /* Colors */
  --c-paper: #faf8f4;
  --c-ink: #1a1612;
  --c-bark: #7a6248;
  --c-mist: #999999;
  --c-teal: #4ECDC4;
  --c-orange: #e8935a;
  --c-rust: #b5522a;
  --c-dust: #e8e0d4;
  --c-warm-white: #fdfbf7;
  --c-border: #e8e0d4;

  /* Typography */
  --font-serif: "Noto Serif TC", Georgia, serif;
  --font-sans: "Noto Sans TC", system-ui, sans-serif;
  --font-display: "Playfair Display", serif;
  --fs-body: 14px;
  --fs-h1: 32px;
  --fs-h2: 22px;
  --fs-h3: 17px;
  --fs-caption: 12px;
  --lh-body: 1.75;
  --lh-heading: 1.3;
  --ls-heading: 0.02em;
  --fw-heading: 600;
  --heading-font: var(--font-serif);

  /* Layout */
  --r-card: 8px;
  --r-button: 6px;
  --r-pill: 999px;
  --bw: 1px;
  --sp-section: 56px;
  --sp-card: 16px;
  --sh-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(80,60,40,0.05);
  --sh-card-hover: 0 4px 12px rgba(0,0,0,0.06), 0 12px 28px rgba(80,60,40,0.1);
  --container-w: 1200px;
}

/* Shell */
.app-shell {
  display: flex;
  min-height: 100vh;
}
.preview-area {
  flex: 1;
  background: var(--c-warm-white);
  overflow-y: auto;
}

/* Tabs */
.tab-bar {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  background: #fff;
  border-bottom: 1px solid var(--c-border);
  position: sticky;
  top: 0;
  z-index: 50;
  flex-wrap: wrap;
}
.tab {
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--c-bark);
  font-weight: 500;
  transition: background 0.15s;
}
.tab:hover { background: rgba(0,0,0,0.04); }
.tab.active { background: var(--c-bark); color: #fff; }

/* Generic card */
.card {
  background: #fff;
  border: var(--bw) solid var(--c-border);
  border-radius: var(--r-card);
  box-shadow: var(--sh-card);
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.15s;
}
.card:hover { box-shadow: var(--sh-card-hover); transform: translateY(-2px); }

.btn {
  appearance: none;
  border: none;
  border-radius: var(--r-button);
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s, background 0.15s;
}
.btn-primary { background: var(--c-teal); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-orange { background: var(--c-orange); color: #fff; }
.btn-ghost { background: transparent; color: var(--c-bark); border: var(--bw) solid var(--c-border); }

h1, h2, h3 {
  font-family: var(--heading-font);
  letter-spacing: var(--ls-heading);
  line-height: var(--lh-heading);
  font-weight: var(--fw-heading);
  color: var(--c-ink);
}
h1 { font-size: var(--fs-h1); }
h2 { font-size: var(--fs-h2); }
h3 { font-size: var(--fs-h3); }
p, span, div, button, input { font-size: var(--fs-body); line-height: var(--lh-body); color: var(--c-ink); }
.caption { font-size: var(--fs-caption); color: var(--c-mist); line-height: 1.4; }

/* ============ Tweaks panel ============ */
.tweak-panel {
  width: 320px;
  background: #fff;
  border-left: 1px solid var(--c-border);
  padding: 16px;
  overflow-y: auto;
  font-family: ui-sans-serif, system-ui;
  font-size: 12px;
}
.tweak-panel h2 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #1a1612; font-family: ui-sans-serif; letter-spacing: normal; }
.tweak-section { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px dashed #e0d8c8; }
.tweak-section:last-child { border-bottom: none; }
.tweak-section-title {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #7a6248;
  margin-bottom: 10px;
  font-weight: 600;
}
.tweak-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.tweak-row label { font-size: 11px; color: #555; flex: 1; }
.tweak-row input[type=color] { width: 32px; height: 24px; border: 1px solid #ddd; border-radius: 4px; padding: 0; cursor: pointer; }
.tweak-row input[type=range] { flex: 0 0 110px; }
.tweak-row .value-display {
  width: 44px; text-align: right; font-family: ui-monospace, monospace;
  font-size: 10px; color: #7a6248;
}
.tweak-row select { padding: 3px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; }
.tweak-actions {
  position: sticky; bottom: 0; background: #fff;
  padding: 12px 0; border-top: 1px solid var(--c-border); margin-top: 8px;
  display: flex; gap: 6px; flex-wrap: wrap;
}
.tweak-actions button {
  flex: 1; min-width: 90px; padding: 6px 10px; font-size: 11px;
  border-radius: 6px; cursor: pointer; border: 1px solid #ddd;
  background: #f8f6f1; color: #555;
}
.tweak-actions button:hover { background: #ebe6dc; }
.tweak-actions button.primary { background: #7a6248; color: #fff; border-color: #7a6248; }

/* Preset chips */
.preset-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.preset-chip {
  padding: 4px 10px; font-size: 11px; border: 1px solid #ddd; border-radius: 4px;
  background: #fff; cursor: pointer;
}
.preset-chip:hover { background: #f8f6f1; }
.preset-chip.active { background: #7a6248; color: #fff; border-color: #7a6248; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ============================================================
   DESIGN TOKENS — single source of truth
   ============================================================ */
const DEFAULT_TOKENS = {
  // colors
  '--c-paper': '#faf8f4',
  '--c-ink': '#1a1612',
  '--c-bark': '#7a6248',
  '--c-mist': '#999999',
  '--c-teal': '#4ECDC4',
  '--c-orange': '#e8935a',
  '--c-rust': '#b5522a',
  '--c-dust': '#e8e0d4',
  '--c-warm-white': '#fdfbf7',
  '--c-border': '#e8e0d4',

  // typography sizes (px)
  '--fs-body': 14,
  '--fs-h1': 32,
  '--fs-h2': 22,
  '--fs-h3': 17,
  '--fs-caption': 12,

  // typography behavior
  '--lh-body': 1.75,
  '--lh-heading': 1.3,
  '--ls-heading': 0.02,
  '--fw-heading': 600,
  '--heading-font': 'serif', // serif | sans

  // layout
  '--r-card': 8,
  '--r-button': 6,
  '--bw': 1,
  '--sp-section': 56,
  '--sp-card': 16,
  '--sh-card': 'medium', // none | soft | medium | strong
};

const PRESETS = {
  'editorial': {
    label: '編輯雜誌風',
    tokens: {
      '--c-paper': '#faf8f4', '--c-bark': '#7a5c40', '--c-teal': '#4ECDC4', '--c-orange': '#e8935a',
      '--fs-h1': 36, '--fs-h2': 24, '--lh-body': 1.85, '--ls-heading': 0.04,
      '--r-card': 4, '--r-button': 3, '--bw': 1, '--heading-font': 'serif',
      '--sh-card': 'soft', '--fw-heading': 500,
    }
  },
  'minimal': {
    label: '極簡',
    tokens: {
      '--c-paper': '#ffffff', '--c-bark': '#2a2a2a', '--c-teal': '#1a1a1a', '--c-orange': '#e85a3c',
      '--fs-h1': 28, '--fs-h2': 20, '--lh-body': 1.65, '--ls-heading': 0,
      '--r-card': 0, '--r-button': 0, '--bw': 1, '--heading-font': 'sans',
      '--sh-card': 'none', '--fw-heading': 700, '--c-border': '#e0e0e0',
    }
  },
  'warm': {
    label: '溫暖手作',
    tokens: {
      '--c-paper': '#faf2e4', '--c-bark': '#8b4513', '--c-teal': '#7a9c5e', '--c-orange': '#d4794a',
      '--fs-h1': 30, '--fs-h2': 22, '--lh-body': 1.8, '--ls-heading': 0.03,
      '--r-card': 16, '--r-button': 24, '--bw': 1.5, '--heading-font': 'serif',
      '--sh-card': 'medium', '--fw-heading': 600, '--c-border': '#e8d5b8',
    }
  },
  'modern': {
    label: '現代簡潔',
    tokens: {
      '--c-paper': '#f7f7f5', '--c-bark': '#333', '--c-teal': '#3aa89e', '--c-orange': '#ff7849',
      '--fs-h1': 34, '--fs-h2': 22, '--lh-body': 1.6, '--ls-heading': -0.01,
      '--r-card': 12, '--r-button': 10, '--bw': 1, '--heading-font': 'sans',
      '--sh-card': 'medium', '--fw-heading': 700, '--c-border': '#e0e0e0',
    }
  },
};

const SHADOW_MAP = {
  'none': 'none',
  'soft': '0 1px 2px rgba(0,0,0,0.04)',
  'medium': '0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(80,60,40,0.05)',
  'strong': '0 4px 12px rgba(0,0,0,0.08), 0 16px 32px rgba(80,60,40,0.12)',
};

/* ============================================================
   Apply tokens to root style
   ============================================================ */
function applyTokens(tokens) {
  const root = document.documentElement;
  for (const [key, val] of Object.entries(tokens)) {
    if (key === '--heading-font') {
      root.style.setProperty(key, val === 'serif' ? 'var(--font-serif)' : 'var(--font-sans)');
    } else if (key === '--sh-card') {
      root.style.setProperty('--sh-card', SHADOW_MAP[val] || SHADOW_MAP.medium);
      // hover shadow auto-derived
      const hoverMap = {
        'none': 'none', 'soft': '0 2px 6px rgba(0,0,0,0.06)',
        'medium': '0 4px 12px rgba(0,0,0,0.06), 0 12px 28px rgba(80,60,40,0.1)',
        'strong': '0 8px 24px rgba(0,0,0,0.12), 0 24px 48px rgba(80,60,40,0.18)',
      };
      root.style.setProperty('--sh-card-hover', hoverMap[val] || hoverMap.medium);
    } else if (typeof val === 'number') {
      // px or unitless
      const isUnitless = ['--lh-body', '--lh-heading', '--fw-heading'].includes(key);
      const isEm = ['--ls-heading'].includes(key);
      root.style.setProperty(key, isUnitless ? String(val) : (isEm ? `${val}em` : `${val}px`));
    } else {
      root.style.setProperty(key, val);
    }
  }
}

            { t: '太平山口述史走讀', d: '2026/05/15', loc: '大同鄉' },

          ].map((e, i) => (
            <article key={i} className="card">

              </div>
              <div style={{ padding: 'var(--sp-card)' }}>
                <h3>{e.t}</h3>
                <p className="caption" style={{ marginTop: 6 }}>{e.d} · 📍 {e.loc}</p>
                <button className="btn btn-orange" style={{ marginTop: 12, width: '100%' }}>立即報名 →</button>

      </section>

      <FooterMock />
    </div>
  );
}

      </div>

      <div className="tweak-section">

function ColorRow({ label, id, tokens, setToken }) {
  return (
    <div className="tweak-row">
      <label>{label}</label>
      <input type="color" value={tokens[id]} onChange={(e) => setToken(id, e.target.value)} />
      <span className="value-display">{tokens[id]}</span>
    </div>
  );
}
function SliderRow({ label, id, tokens, setToken, min, max, step = 1, unit = '' }) {
  return (
    <div className="tweak-row">
      <label>{label}</label>
      <input type="range" min={min} max={max} step={step}
        value={tokens[id]}
        onChange={(e) => setToken(id, parseFloat(e.target.value))}
      />
      <span className="value-display">{tokens[id]}{unit}</span>
    </div>
  );
}
function SelectRow({ label, id, tokens, setToken, options }) {
  return (
    <div className="tweak-row">
      <label>{label}</label>
      <select value={tokens[id]} onChange={(e) => setToken(id, e.target.value)}>
        {options.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
      </select>
    </div>
  );
}

/* ============================================================
   App
   ============================================================ */
const PAGES = [
  { id: 'home', label: '首頁', Comp: HomePage },
  { id: 'bookstore', label: '書店列表', Comp: BookstorePage },
  { id: 'article', label: '文章詳情', Comp: ArticlePage },
  { id: 'checkout', label: '結帳', Comp: CheckoutPage },
  { id: 'dashboard', label: '會員中心', Comp: DashboardPage },
];

function App() {
  const [page, setPage] = useState('home');
  const [tokens, setTokens] = useState(DEFAULT_TOKENS);
  const [activePreset, setActivePreset] = useState(null);

  useEffect(() => {
    applyTokens(tokens);
  }, [tokens]);

  const setToken = (id, val) => {
    setTokens(prev => ({ ...prev, [id]: val }));
    setActivePreset(null);
  };

  const applyPreset = (id) => {
    const merged = { ...DEFAULT_TOKENS, ...PRESETS[id].tokens };
    setTokens(merged);
    setActivePreset(id);
  };

  const reset = () => {
    setTokens(DEFAULT_TOKENS);
    setActivePreset(null);
  };

  const copyJson = async () => {
    const summary = Object.fromEntries(Object.entries(tokens));
    try {
      await navigator.clipboard.writeText(JSON.stringify(summary, null, 2));
      alert('已複製 tokens 到剪貼簿，貼給 Claude/工程師即可');
    } catch {
      alert('複製失敗，請手動：' + JSON.stringify(summary));
    }
  };

  const PageComp = PAGES.find(p => p.id === page)?.Comp || HomePage;

  return (
    <div className="app-shell">
      <div className="preview-area">
        <div className="tab-bar">
          {PAGES.map(p => (
            <button key={p.id}
              className={`tab ${page === p.id ? 'active' : ''}`}
              onClick={() => setPage(p.id)}
            >{p.label}</button>
          ))}
        </div>
        <PageComp />
      </div>
      <TweakPanel
        tokens={tokens}
        setToken={setToken}
        applyPreset={applyPreset}
        activePreset={activePreset}
        copyJson={copyJson}
        reset={reset}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
